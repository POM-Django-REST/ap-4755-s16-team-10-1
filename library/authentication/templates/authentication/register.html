{% extends 'base.html' %}

{% block content %}
    <h2>Реєстрація користувача</h2>
    
    {% if form.errors %}
        <p style="color: red;">Перевірте правильність введених даних.</p>
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Зареєструватися</button>
    </form>
{% endblock %}
